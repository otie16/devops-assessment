apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-assessment-api
  namespace: devops-assessment
  labels:
    app: devops-assessment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-assessment-api
  template:
    metadata:
      labels:
        app: devops-assessment-api
    spec:
      containers:
        - name: devops-assessment-api
          image: otobongedoho18361/devops-assessment-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: devops-assessment-config
            - secretRef:
                name: devops-assessment-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"