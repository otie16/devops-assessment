name: Deploy to backend Docker Hub

name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:

env:
  IMAGE_NAME: devops-assessment-api

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Run Black formatting check
        run: black --check .

      - name: Run unit tests
        run: pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

  docker-push:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-api:${{ github.sha }}

            echo "Docker image pushed successfully to Docker Hub with tags: latest and ${{ github.sha }}    "